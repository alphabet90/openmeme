apiVersion: v1
kind: ResourceQuota
metadata:
  name: openmeme-quota
  namespace: openmeme
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    requests.storage: 100Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: openmeme-limits
  namespace: openmeme
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi

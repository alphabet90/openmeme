apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openmeme

resources:
  # Namespace
  - ../namespace.yaml
  # Config & secrets
  - configmap.yaml
  - secret.yaml
  # PostgreSQL
  - postgres/statefulset.yaml
  - postgres/service.yaml
  # Redis
  - redis/pvc.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  # API
  - api/pvc.yaml
  - api/deployment.yaml
  - api/service.yaml
  - api/hpa.yaml
  - api/pdb.yaml
  - api/ingress.yaml

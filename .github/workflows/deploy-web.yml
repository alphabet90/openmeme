name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/design-system/**"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build with OpenNext
        run: pnpm --filter @openmeme/web build
        env:
          NEXT_PUBLIC_MEMES_API_URL: ${{ secrets.NEXT_PUBLIC_MEMES_API_URL }}
          MEMES_API_KEY: ${{ secrets.MEMES_API_KEY }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @openmeme/web deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_TAG_CACHE_D1_ID: ${{ secrets.NEXT_TAG_CACHE_D1_ID }}

services:
  meilisearch:
    # localizedAttributes requires Meilisearch >= v1.10
    image: getmeili/meilisearch:v1.15
    container_name: openmeme-meilisearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env (min 16 bytes)}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meili_data:

# OpenMeme — production nginx config.
#
# Adjust the two root paths and the php-fpm socket for your server, then:
#   ln -s /path/to/this/nginx.conf /etc/nginx/sites-enabled/openmeme.conf
#   nginx -t && systemctl reload nginx

# Rate limit for /api/* (suggest is called on every keystroke) per client IP.
limit_req_zone $binary_remote_addr zone=om_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name openmeme.example.com;

    root /var/www/openmeme/apps/web/public;
    index index.php;

    # ── Compression ──
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json application/xml text/plain image/svg+xml;

    # ── Security headers ──
    # Dynamic responses get the full OWASP set — including the per-request
    # nonce-based Content-Security-Policy — from send_security_headers() in
    # src/helpers.php. Don't repeat them at server level: nginx `add_header`
    # appends, and a duplicated X-Frame-Options is treated as invalid by
    # browsers. Static-asset locations below add their own minimal set.
    # HSTS is also sent by PHP whenever the request arrived over TLS
    # (X-Forwarded-Proto from the TLS-terminating proxy in front of this).

    # ── Meme images: served straight from /memes/* (the source of truth) ──
    location /memes/ {
        alias /var/www/openmeme/memes/;
        location ~* \.(jpe?g|png|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff always;
            # Images must stay embeddable from the CDN host / external pages.
            add_header Cross-Origin-Resource-Policy cross-origin always;
        }
        # Never expose MDX/metadata files
        return 404;
    }

    # ── Webpack bundles (cache-busted with ?v=mtime) ──
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        add_header X-Content-Type-Options nosniff always;
    }

    # ── API endpoints: rate-limited, then → front controller ──
    location ~ ^(/en)?/api/ {
        limit_req zone=om_api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php?$query_string;
    }

    # ── Everything else → front controller ──
    location / {
        # Applies only to files served directly from public/; requests that
        # fall through to /index.php get their headers from PHP instead.
        add_header X-Content-Type-Options nosniff always;
        try_files $uri /index.php?$query_string;
    }

    # ── Meilisearch env (alternative to apps/web/.env) ──
    # The app reads MEILI_URL / MEILI_SEARCH_KEY from apps/web/.env (or the
    # repo-root .env) by default. To inject via PHP-FPM instead, set in the
    # pool config (/etc/php/8.3/fpm/pool.d/www.conf):
    #   env[MEILI_URL] = http://127.0.0.1:7700
    #   env[MEILI_SEARCH_KEY] = <search-only key from: php bin/meili-keys.php>
    # or per-request below:
    #   fastcgi_param MEILI_URL http://127.0.0.1:7700;
    #   fastcgi_param MEILI_SEARCH_KEY <search-only key>;
    location = /index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # Block direct execution of any other .php file
    location ~ \.php$ {
        return 404;
    }
}

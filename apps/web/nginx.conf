# OpenMeme — production nginx config.
#
# Adjust the two root paths and the php-fpm socket for your server, then:
#   ln -s /path/to/this/nginx.conf /etc/nginx/sites-enabled/openmeme.conf
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name openmeme.example.com;

    root /var/www/openmeme/apps/web/public;
    index index.php;

    # ── Compression ──
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json application/xml text/plain image/svg+xml;

    # ── Security headers ──
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Meme images: served straight from /memes/* (the source of truth) ──
    location /memes/ {
        alias /var/www/openmeme/memes/;
        location ~* \.(jpe?g|png|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        # Never expose MDX/metadata files
        return 404;
    }

    # ── Webpack bundles (cache-busted with ?v=mtime) ──
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Everything else → front controller ──
    location / {
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # Block direct execution of any other .php file
    location ~ \.php$ {
        return 404;
    }
}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmeme-web
  labels:
    app: openmeme-web
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: openmeme-web
  template:
    metadata:
      labels:
        app: openmeme-web
    spec:
      containers:
        - name: web
          image: openmeme/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_MEMES_API_URL
              valueFrom:
                configMapKeyRef:
                  name: openmeme-config
                  key: api-url
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: openmeme-config
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openmeme-secrets
                  key: redis-password
            - name: MEMES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openmeme-secrets
                  key: api-key
            - name: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: openmeme-secrets
                  key: server-actions-key
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 12
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 12
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

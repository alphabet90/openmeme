user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limit zone for /api/* endpoints.
    limit_req_zone $binary_remote_addr zone=om_api:10m rate=10r/s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json application/xml text/plain image/svg+xml;

    server {
        listen ${PORT};
        server_name _;

        root /var/www/apps/web/public;
        index index.php;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Meme images: served straight from /memes/ (the source of truth).
        location /memes/ {
            alias /var/www/memes/;
            location ~* \.(jpe?g|png|gif|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            # Never expose MDX/metadata files.
            return 404;
        }

        # Webpack bundles (cache-busted with ?v=mtime).
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        location = /favicon.ico { access_log off; log_not_found off; }

        # API endpoints: rate-limited, then front controller.
        location ~ ^(/en)?/api/ {
            limit_req zone=om_api burst=20 nodelay;
            limit_req_status 429;
            try_files $uri /index.php?$query_string;
        }

        # Everything else -> front controller.
        location / {
            try_files $uri /index.php?$query_string;
        }

        location = /index.php {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_hide_header X-Powered-By;
        }

        # Block direct execution of any other .php file.
        location ~ \.php$ {
            return 404;
        }
    }
}
